<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./identity.css">
    <title>인격 도감</title>
</head>
<body>

    <header>
        <button id="back-btn">← 뒤로 가기</button>
        <div class="search-container">
            <div id="identity-serach-grid" class="identity-serach-grid">
                <div id="yisang" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/yisang.png">
                </div>
                <div id="faust" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/faust.png">
                </div>
                <div id="donquixote" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/donquixote.png">
                </div>
                <div id="ryoshu" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/ryoshu.png">
                </div>
                <div id="meursault" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/meursault.png">
                </div>
                <div id="honglu" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/honglu.png">
                </div>
                <div id="heathcliff" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/heathcliff.png">
                </div>
                <div id="ishmael" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/ishmael.png">
                </div>
                <div id="rodya" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/rodya.png">
                </div>
                <div id="sinclair" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/sinclair.png">
                </div>
                <div id="outis" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/outis.png">
                </div>
                <div id="gregor" class="identity-serach-button">
                    <img class="identity-serach-button-img" src="asset/icon/gregor.png">
                </div>
            </div>
            <input type="text" id="search-input" placeholder="검색">
        </div>
    </header>

    <main>
        <div id="card-container"></div>
    </main>

    <div id="info-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            
            <div class="modal-header">
                <img id="modal-img" src="" alt="인격 이미지">
                <div class="modal-title">
                    <h2 id="modal-name">인격 이름</h2>
                    <p id="modal-affil">
                    <div id="modal-keywords"></div>
                </div>
            </div>

            <div class="modal-body" id="modal-details">
            </div>
        </div>
    </div>
    <script src="identity.js"></script>
</body>
</html>
